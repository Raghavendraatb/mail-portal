<!DOCTYPE html>
<html>
<head>
    <title>Mail Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f1f3f4;
        }

        header {
            background: #ffffff;
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
            font-size: 18px;
            font-weight: bold;
        }

        .container {
            padding: 10px 20px;
        }

        .status {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .error {
            background: #ffeaea;
            color: #cc0000;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #cc0000;
        }

        .mail {
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 12px;
            cursor: pointer;
        }

        .mail:hover {
            background: #f5f5f5;
        }

        .subject {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .meta {
            font-size: 12px;
            color: #555;
            margin-bottom: 6px;
        }

        .body {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .refresh-btn {
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #ffffff;
        }
    </style>
</head>

<body>

<header>📬 Mail Portal</header>

<div class="container">

    <div class="status">
        <span>Last refreshed: {{ refreshed }}</span>

        <!-- ✅ Refresh Button -->
        <form method="get" action="/" style="margin:0;">
            <button class="refresh-btn" type="submit">🔄 Refresh</button>
        </form>
    </div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if emails %}
        {% for mail in emails %}
        <details class="mail">
            <summary>
                <div class="subject">{{ mail.subject }}</div>
                <div class="meta">
                    <div><strong>From:</strong> {{ mail.from }}</div>
                    <div><strong>To:</strong> {{ mail.to }}</div>
                    <div><strong>Date:</strong> {{ mail.date }}</div>
                </div>
            </summary>

            <div class="body">
                {{ mail.body | safe }}
            </div>
        </details>
        {% endfor %}
    {% else %}
        <p>No emails available.</p>
    {% endif %}

</div>

</body>
</html>
